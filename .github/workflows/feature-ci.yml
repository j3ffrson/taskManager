name: Auto Merge Feature PRs

on:
  workflow_run:
    workflows: ["develop-ci"]
    types:
      - completed

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' && startsWith(github.head_ref, 'feature/')

    steps:
      - name: Auto merge PR
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash